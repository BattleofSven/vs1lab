<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<header class="header">
    <img src="./images/location.png" class="header__image" alt="an image of a map and location">
    <h1 class="header__title">GeoTagApp</h1>
    <nav class="header__navigation">
        <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
    </nav>
</header>

<main class="main">
    <section class="main__tagging tagging">
        <h2>Tagging</h2>

        <!-- ############### VS1Lab 1a Form 1 Start -->
        <form class="tag_form" id="tag-form" action="/tagging" method="post">
            <fieldset>
                <legend>Add a new GeoTag</legend>
                <div class="entry_with_text">
                    <label for="latitude-input">Latitude: </label>
                    <input id="latitude-input" type="text" placeholder="49.01379" required disabled/>
                </div>
                <div class="entry_with_text">
                    <label for="longitude-input">Longitude: </label>
                    <input id="longitude-input" type="text" placeholder="8.390071" required disabled/>
                </div>
                <div class="entry_with_text">
                    <label for="name-input">Name: </label>
                    <input id="name-input" type="text" placeholder="e.g. Central Berlin" maxlength="10" required/>

                </div>
                <div class="entry_with_text">
                    <label for="hashtag-input">Hashtag: </label>
                    <input id="hashtag-input" type="text" placeholder="e.g. #ber" maxlength="10" pattern="#[a-zA-Z]*[0-9]*"/>
                </div>
                <Button type="submit" style="width: 100%">AddTag</Button>
            </fieldset>

            <!-- ... your code here ... -->

        </form>
        <!-- ############### VS1Lab 1a Form 1 End -->

    </section>

    <section class="main__discovery discovery">
        <h2 class="discovery__title">Discovery</h2>

        <!-- ############### VS1Lab 1a Form 2 Start -->
        <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">
            <fieldset>
                <legend>Search</legend>
                <label for="search-input">Search term or keywords:</label>
                <input id="search-input" type="text" placeholder="e.g. Berlin"/>
                <input type="hidden" name="latitude" id="search-latitude" placeholder="e.g. 49.01379"/>
                <input type="hidden" name="longitude" id="search-longitude" placeholder="e.g. 8.390071"/>
                <button type="submit">Search</button>
            </fieldset>
            <!-- ... your code here ... -->

        </form>
        <!-- ############### VS1Lab 1a Form 2 End -->

        <div class="discovery__wrapper">
            <div class="discovery__taglist">
                <ul class="discovery__results" id="discoveryResults">
                    <li>Castle (49.01379, 8.404435) #sight</li>
                    <li>IWI (49.01379, 8.390071) #edu</li>
                </ul>
            </div>

            <div id="map" class="discovery__map">
                <img src="./images/mapview.jpg" alt="a map with locations" id="mapView"/>
                <span>Result map</span>
            </div>
        </div>
    </section>

</main>

<footer class="footer">
    <span>(c) 2021/22 HKA_IWI_VSYS</span>
</footer>
<script src="./javascripts/geotagging.js"></script>
</body>

</html>
